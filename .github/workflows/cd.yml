name: Deploy Full Stack

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/cd.yml"

jobs:
  deploy-backend:
    name: Deploy NestJS Backend to Railway
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME || secrets.RAILWAY_SERVICE_NAME }}

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: backend/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install backend dependencies
        run: yarn install --frozen-lockfile

      - name: Build NestJS backend
        run: yarn build

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate Railway configuration
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "Missing GitHub secret: RAILWAY_TOKEN" >&2
            exit 1
          fi
          if [ -z "$RAILWAY_SERVICE_NAME" ]; then
            echo "Missing Railway service name. Set repository variable RAILWAY_SERVICE_NAME or secret RAILWAY_SERVICE_NAME." >&2
            exit 1
          fi

      - name: Deploy backend to Railway
        run: railway up --service "$RAILWAY_SERVICE_NAME"

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.36

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Vercel project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy frontend to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
